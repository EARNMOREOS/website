version: "2"
type: frontend
tech_stack:
  - language: TypeScript
  - framework: Next.js
  - ui_library: React
  - other: Tailwind CSS, Prisma, NextAuth
routes:
  - path: /
    file: src/app/page.tsx
    auth_required: false
    description: Public landing page for the rewards platform
  - path: /login
    file: src/app/login/page.tsx
    auth_required: false
    description: Login page for returning users
  - path: /signup
    file: src/app/signup/page.tsx
    auth_required: false
    description: User registration page with optional referral code
  - path: /dashboard
    file: src/app/dashboard/page.tsx
    auth_required: true
    description: Authenticated user dashboard showing balance, earnings, and recent activity
  - path: /dashboard/tasks
    file: src/app/dashboard/tasks/page.tsx
    auth_required: true
    description: Task listing page where users can complete tasks to earn coins
  - path: /dashboard/wallet
    file: src/app/dashboard/wallet/page.tsx
    auth_required: true
    description: Wallet page for withdrawal requests and transaction history
  - path: /dashboard/referrals
    file: src/app/dashboard/referrals/page.tsx
    auth_required: true
    description: Referral page to copy an invite link and review referral rewards
  - path: /admin
    file: src/app/admin/page.tsx
    auth_required: true
    description: Admin dashboard overview requiring ADMIN role
  - path: /admin/withdrawals
    file: src/app/admin/withdrawals/page.tsx
    auth_required: true
    description: Admin withdrawal management page for reviewing and updating requests
features:
  - name: User Login
    description: User signs in with email and password using credential-based authentication.
    files:
      - src/app/login/page.tsx
      - src/lib/auth.ts
      - src/app/api/auth/[...nextauth]/route.ts
    entry_route: /login
    user_interactions:
      - Fill email input field
      - Fill password input field
      - Click Log In button
      - Redirect to /dashboard on success
    api_calls:
      - method: POST
        endpoint: /api/auth/[...nextauth]
    auth_required: false
  - name: User Registration
    description: New user creates an account with optional referral code and is redirected to login.
    files:
      - src/app/signup/page.tsx
      - src/app/api/auth/register/route.ts
    entry_route: /signup
    user_interactions:
      - Fill name, email, and password fields
      - Enter referral code optionally
      - Click Sign Up button
      - See error if registration fails
    api_calls:
      - method: POST
        endpoint: /api/auth/register
    auth_required: false
  - name: Task Completion
    description: Authenticated users fetch available tasks and complete them to earn coins.
    files:
      - src/app/dashboard/tasks/page.tsx
      - src/app/dashboard/tasks/TaskList.tsx
      - src/app/api/tasks/route.ts
      - src/app/api/tasks/complete/route.ts
    entry_route: /dashboard/tasks
    user_interactions:
      - Load task list
      - Click Start on a task
      - See task marked complete after completion
    api_calls:
      - method: GET
        endpoint: /api/tasks
      - method: POST
        endpoint: /api/tasks/complete
    auth_required: true
  - name: Withdrawal Request
    description: Users request a payout by submitting withdrawal details when balance is sufficient.
    files:
      - src/app/dashboard/wallet/page.tsx
      - src/app/dashboard/wallet/WithdrawalForm.tsx
      - src/app/api/withdrawals/route.ts
    entry_route: /dashboard/wallet
    user_interactions:
      - Select payout method
      - Enter payment details
      - Click Withdraw All Funds
      - See confirmation or error message
    api_calls:
      - method: POST
        endpoint: /api/withdrawals
    auth_required: true
  - name: Referral Sharing
    description: Users copy a personalized referral link and track referral stats.
    files:
      - src/app/dashboard/referrals/page.tsx
      - src/app/dashboard/referrals/CopyLinkButton.tsx
    entry_route: /dashboard/referrals
    user_interactions:
      - View referral link
      - Click copy button
      - Review referral earnings and invited users
    api_calls:
      - method: GET
        endpoint: /dashboard/referrals (server-side data load)
    auth_required: true
  - name: Admin Withdrawal Management
    description: Admins view withdrawal requests and update request status.
    files:
      - src/app/admin/withdrawals/page.tsx
      - src/app/admin/withdrawals/AdminWithdrawalsClient.tsx
      - src/app/api/admin/withdrawals/route.ts
      - src/app/api/admin/withdrawals/[id]/route.ts
    entry_route: /admin/withdrawals
    user_interactions:
      - Load withdrawal list
      - Approve or reject a request
      - Mark approved request as paid
    api_calls:
      - method: GET
        endpoint: /api/admin/withdrawals
      - method: PATCH
        endpoint: /api/admin/withdrawals/{id}
    auth_required: true
known_limitations:
  - issue: Forgot password link is a placeholder and does not lead to a recovery flow
    location: src/app/login/page.tsx
    impact: Users cannot reset forgotten passwords through the UI
  - issue: Crypto withdrawal option is marked coming soon and disabled in the UI
    location: src/app/dashboard/wallet/WithdrawalForm.tsx
    impact: Only PayPal withdrawals are currently functional
  - issue: Referral link generation falls back to localhost if NEXT_PUBLIC_SITE_URL is not configured
    location: src/app/dashboard/referrals/page.tsx
    impact: Referral links may be invalid in production without environment variable
